<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Isekai</title>

<style>
/* Reset & Base Styles */
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  background: #0b0f19; /* Deeper, richer night sky */
  color: #e2e8f0;
  font-family: 'Inter', sans-serif;
  line-height: 1.7;
}

/* Typography */
h1, h2, h3, .rank {
  font-family: 'Cinzel', serif; /* Elegant fantasy font */
  letter-spacing: 1px;
}

/* Header / Hero Section */
header {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px 20px;
  background:
    linear-gradient(rgba(11, 15, 25, 0.8), rgba(11, 15, 25, 0.95)),
    url("https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1600");
  background-size: cover;
  background-position: center;
  position: relative;
}

/* Subtle gold accent line under the main title */
header h1 {
  font-size: clamp(2.8rem, 6vw, 4.5rem);
  color: #f59e0b;
  text-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
  margin-bottom: 10px;
}

header .subtitle {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  color: #94a3b8;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 25px;
}

header p {
  font-size: 1.2rem;
  max-width: 650px;
  margin-bottom: 40px;
  color: #94a3b8;
}

/* Buttons */
.btn {
  display: inline-block;
  padding: 14px 36px;
  background: transparent;
  color: #f59e0b;
  text-decoration: none;
  font-family: 'Cinzel', serif;
  font-weight: bold;
  font-size: 0.95rem;
  letter-spacing: 2px;
  border: 2px solid #f59e0b;
  border-radius: 4px;
  box-shadow: inset 0 0 0 0 rgba(245, 158, 11, 0.2);
  transition: all 0.3s ease;
}

.btn:hover {
  background: #f59e0b;
  color: #0b0f19;
  box-shadow: 0 0 25px rgba(245, 158, 11, 0.4);
  transform: translateY(-2px);
}

/* Sections */
section {
  padding: 100px 10% 80px 10%;
  max-width: 1400px;
  margin: 0 auto;
}

.section-title {
  font-size: 2.2rem;
  color: #f8fafc;
  margin-bottom: 20px;
  text-align: center;
  position: relative;
}

/* Elegant divider line */
.section-title::after {
  content: '';
  display: block;
  width: 60px;
  height: 2px;
  background: #f59e0b;
  margin: 15px auto 0 auto;
  opacity: 0.6;
}

.lead-text {
  max-width: 750px;
  margin: 0 auto 50px auto;
  text-align: center;
  font-size: 1.15rem;
  color: #94a3b8;
}

/* Path Cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 30px;
}

.card {
  background: #111827;
  padding: 35px 25px;
  border-radius: 4px; /* Sharper corners look more premium/medieval */
  border: 1px solid #1f2937;
  border-top: 3px solid #374151; /* Subtle top accent border */
  text-align: center;
  transition: all 0.3s ease;
}

.card:hover {
